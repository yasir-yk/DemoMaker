<script type="text/javascript">
  $(document).ready(function(){
  var today = new Date();
  var dd = today.getDate();
  var mm = today.getMonth()+1; 
  var yyyy = today.getFullYear();
  if(dd<10) 
  {
    dd='0'+dd;
  } 
  var today = dd+'-'+mm+'-'+yyyy;
  $("#demo").find('option').remove();
  $("#ProjectName").on("change paste keyup",function() {
    var checkboxvalue = $(this).val();
    $("#demo").append("<option>demo1</option>");
    $("#date").append("<option>"+ today +"</option>");
    $.ajax({
      type: "POST",
      dataType: "json",
      data:{ checkboxvalue : checkboxvalue},
      url: "demo-files/ajax/filedir.php",
      success: function(data){        
        $("#demo").find('option').remove();
         $("#demo").append("<option>demo1</option>");
        $.each(data, function(i, order){
           if('demo1' !== data[i]){
            $("#demo").append("<option>" + data[i] + "</option>");
          }
        });  
      }
    });
  });
  $("#demo").on("change paste keyup",function() {
    var subvalue = $(this).val();
    var checkboxvalue = $("#ProjectName").val();
    $.ajax({
      type: "POST",
      dataType: "json",
      data:{ subvalue : subvalue, checkboxvalue:checkboxvalue},
      url: "demo-files/ajax/filedir2.php",
      success: function(data){        
        $("#date").find('option').remove();
         $("#date").append("<option>"+ today +"</option>");
        $.each(data, function(i, order){
          if(today !== data[i]){
            $("#date").append("<option>" + data[i] + "</option>");
          }
       });  

      }
    });
  });
});
</script>
<script type="text/javascript">
  $(document).ready(function(){
    $('input:checkbox[name=fixednav]').click(function(){
       if($('input:checkbox[name=fixednav]').is(':checked')){
           $("#wrapper").append('<input type="file" name="navheader" id="navheader">');
        }
    });
    $('input:radio[value=stickynav]').click(function(){
       if($('input:radio[value=stickynav]').is(':checked')){
           $(".stickynav-box").find("#nav").remove();
            $(".stickynav-box").find(".label").remove();
           $(".stickynav-box").append('<label class="d-block label">Navigation Image</label><input type="file" required="" name="nav" id="nav" onchange="readURLnav(this);">');
        }
    });
    $('input:radio[value=fixheader]').click(function(){
       if($('input:radio[value=fixheader]').is(':checked')){
           $(".stickynav-box").find("#nav").remove();
           $(".stickynav-box").find(".label").remove();
        }
    });
  });
</script>
